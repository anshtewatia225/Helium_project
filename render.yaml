# Render Blueprint for the Groq proxy. Point Render at this repo; it deploys the
# service in ./server. Set GROQ_API_KEY (and optionally CORS_ORIGIN) in the
# dashboard — they're marked sync:false so they're never committed.
services:
  - type: web
    name: shopper-intent-proxy
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
